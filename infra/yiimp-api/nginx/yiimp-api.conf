# /etc/nginx/sites-available/yiimp-api.conf
# TLS is added by `certbot --nginx -d api.stratum.pool.honest.money`.

server {
    listen 80;
    listen [::]:80;
    server_name api.stratum.pool.honest.money;


    # short-lived edge cache; front-end also caches
    add_header X-Yiimp-Api "1" always;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 10s;
        proxy_connect_timeout 3s;
    }

    # basic abuse protection — this is public, but not free
    limit_req zone=yiimp_api burst=40 nodelay;
}

# Put this in /etc/nginx/conf.d/yiimp-api-limits.conf:
#   limit_req_zone $binary_remote_addr zone=yiimp_api:10m rate=20r/s;
