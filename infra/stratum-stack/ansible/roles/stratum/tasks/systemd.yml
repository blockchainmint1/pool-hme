---
- name: Install per-algo systemd units
  template:
    src: stratum-aws.service.j2
    dest: "/etc/systemd/system/stratum-aws-{{ item }}.service"
    mode: "0644"
  loop: "{{ stratum_algos }}"
  vars:
    algo: "{{ item }}"
  notify:
    - reload systemd
    - restart stratum

- name: Ensure drop-in dirs exist
  file:
    path: "/etc/systemd/system/stratum-aws-{{ item }}.service.d"
    state: directory
    mode: "0755"
  loop: "{{ stratum_algos }}"

- name: Install per-algo drop-in overrides
  template:
    src: override.conf.j2
    dest: "/etc/systemd/system/stratum-aws-{{ item }}.service.d/override.conf"
    mode: "0644"
  loop: "{{ stratum_algos }}"
  notify:
    - reload systemd
    - restart stratum

- name: Enable + start stratum services
  systemd:
    name: "stratum-aws-{{ item }}.service"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ stratum_algos }}"
