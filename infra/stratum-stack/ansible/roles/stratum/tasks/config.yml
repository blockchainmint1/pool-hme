---
- name: Ensure config dir exists
  file:
    path: "{{ stratum_install_dir }}/config"
    state: directory
    owner: "{{ stratum_user }}"
    group: "{{ stratum_group }}"
    mode: "0750"

- name: Render per-algo configs
  template:
    src: "{{ item }}.conf.j2"
    dest: "{{ stratum_install_dir }}/config/{{ item }}.conf"
    owner: "{{ stratum_user }}"
    group: "{{ stratum_group }}"
    mode: "0640"
  loop: "{{ stratum_algos }}"
  notify: restart stratum
