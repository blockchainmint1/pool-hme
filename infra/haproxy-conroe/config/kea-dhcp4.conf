// /etc/kea/kea-dhcp4.conf
//
// DHCP for one container's miner subnet.
//
// Each container is its own island with a UNIQUE /24:
//   Container 1  →  10.1.0.0/24  (Beelink 10.1.0.10, miners 10.1.0.100-.254)
//   Container 2  →  10.2.0.0/24
//   ...
//   Container 6  →  10.6.0.0/24
//
// The Beelink is .10; .1-.9 and .11-.99 are reserved for static infra
// (switch mgmt, PDU, spare). Pool of 155 leases covers ~200 L9s if some
// static-assigned; bump to /23 if a container ever exceeds ~150 miners.
//
// `restore.sh --container N` fills these placeholders in.
{
  "Dhcp4": {
    "interfaces-config": {
      "interfaces": [ "__LAN__" ],
      "dhcp-socket-type": "raw"
    },
    "lease-database": {
      "type": "memfile",
      "persist": true,
      "name": "/var/lib/kea/kea-leases4.csv",
      "lfc-interval": 3600
    },
    "expired-leases-processing": {
      "reclaim-timer-wait-time": 10,
      "flush-reclaimed-timer-wait-time": 25,
      "hold-reclaimed-time": 3600,
      "max-reclaim-leases": 100,
      "max-reclaim-time": 250
    },
    "valid-lifetime": 86400,
    "renew-timer": 43200,
    "rebind-timer": 75600,
    "subnet4": [
      {
        "id": 1,
        "subnet": "__LAN_NET__",
        "pools": [ { "pool": "__LAN_POOL_START__ - __LAN_POOL_END__" } ],
        "option-data": [
          { "name": "routers",             "data": "__LAN_GATEWAY__" },
          { "name": "domain-name-servers", "data": "1.1.1.1, 9.9.9.9" },
          { "name": "domain-name",         "data": "c__CONTAINER__.conroe.lan" }
        ]
      }
    ],
    "loggers": [
      {
        "name": "kea-dhcp4",
        "output_options": [ { "output": "/var/log/kea-dhcp4.log" } ],
        "severity": "INFO"
      }
    ]
  }
}
