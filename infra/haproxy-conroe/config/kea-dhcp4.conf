// /etc/kea/kea-dhcp4.conf
//
// DHCP for one container's miner subnet.
// Scope: 10.0.0.100 – 10.0.0.254 (155 leases; a container has ~200 L9s,
// so bump to a /23 if a container ever exceeds ~150 miners). The Beelink
// itself is 10.0.0.10; .1–.9 and .11–.99 are reserved for static infra
// (switch mgmt IP, PDU, spare).
//
// Every container runs an identical copy of this file — subnets are
// isolated behind NAT so there's no collision.
{
  "Dhcp4": {
    "interfaces-config": {
      "interfaces": [ "__LAN__" ],
      "dhcp-socket-type": "raw"
    },
    "lease-database": {
      "type": "memfile",
      "persist": true,
      "name": "/var/lib/kea/kea-leases4.csv",
      "lfc-interval": 3600
    },
    "expired-leases-processing": {
      "reclaim-timer-wait-time": 10,
      "flush-reclaimed-timer-wait-time": 25,
      "hold-reclaimed-time": 3600,
      "max-reclaim-leases": 100,
      "max-reclaim-time": 250
    },
    "valid-lifetime": 86400,
    "renew-timer": 43200,
    "rebind-timer": 75600,
    "subnet4": [
      {
        "id": 1,
        "subnet": "10.0.0.0/24",
        "pools": [ { "pool": "10.0.0.100 - 10.0.0.254" } ],
        "option-data": [
          { "name": "routers",             "data": "10.0.0.10" },
          { "name": "domain-name-servers", "data": "1.1.1.1, 9.9.9.9" },
          { "name": "domain-name",         "data": "conroe.lan" }
        ]
      }
    ],
    "loggers": [
      {
        "name": "kea-dhcp4",
        "output_options": [ { "output": "/var/log/kea-dhcp4.log" } ],
        "severity": "INFO"
      }
    ]
  }
}
