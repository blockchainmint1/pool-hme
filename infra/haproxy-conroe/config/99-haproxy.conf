# /etc/sysctl.d/99-haproxy.conf
# Kernel tuning for ~1000 concurrent stratum sessions + long keepalives.
net.netfilter.nf_conntrack_max = 262144
net.core.somaxconn = 65535
net.core.netdev_max_backlog = 16384
net.ipv4.tcp_max_syn_backlog = 16384
net.ipv4.ip_local_port_range = 10000 65535
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 30
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 6

# Allow haproxy to bind to the Conroe LAN VIP (10.0.0.10) even when that
# interface isn't up yet — needed during EC2 burn-in (--skip-netplan) and
# also survives an interface flap on-site.
net.ipv4.ip_nonlocal_bind = 1
