#-----------------------------------------------------------------------
# haproxy-conroe — on-site stratum proxy
# Source of truth: infra/haproxy-conroe/config/haproxy.cfg
# Do NOT edit /etc/haproxy/haproxy.cfg on the box directly.
#-----------------------------------------------------------------------

global
    log         /dev/log local0
    log         /dev/log local1 notice
    maxconn     200000
    nbthread    4
    user        haproxy
    group       haproxy
    daemon

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect  5s
    timeout client   10m
    timeout server   10m
    timeout tunnel   1h

#-- miner side -----------------------------------------------------------
frontend stratum_in
    bind *:3433
    mode tcp
    option tcpka
    default_backend stratum_out

#-- upstream to cloud stratum -------------------------------------------
backend stratum_out
    mode tcp
    option tcpka
    option tcp-check
    # One long-lived pooled connection per HAProxy worker thread is fine
    # for stratum; miners multiplex over the frontend, not the backend.
    server pool1 stratum.pool.texitcoin.org:3433 check inter 5s fall 3 rise 2

#-- stats (LAN only) -----------------------------------------------------
frontend stats
    bind 10.0.0.10:8404
    mode http
    stats enable
    stats uri /
    stats refresh 5s
    stats admin if TRUE
