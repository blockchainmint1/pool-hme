# /etc/netplan/99-haproxy.yaml
#
# One Beelink per container. Two NICs:
#   WAN — DHCP client, plugged into the site's SG2218 (landlord uplink).
#   LAN — static, plugged into the container's miner switch.
#
# The Beelink NATs the miners' LAN subnet out through the WAN NIC, so
# miners see one gateway (the Beelink's LAN IP) and the landlord CPE
# sees one device per container.
#
# Each container has a UNIQUE LAN subnet (10.N.0.0/24 for N=1..6) so
# admin access by direct IP is unambiguous. Subnets do not need to
# be unique for correctness (each is NAT-isolated) — the uniqueness is
# only there to keep humans from confusing which container they're on.
#
# `restore.sh --container N` auto-detects the interface names and fills
# in the LAN CIDR before applying — the placeholders below are rewritten.
network:
  version: 2
  renderer: networkd
  ethernets:
    __WAN__:
      dhcp4: true
      dhcp6: false
      optional: false
    __LAN__:
      dhcp4: false
      addresses:
        - __LAN_CIDR__
      nameservers:
        addresses: [1.1.1.1, 9.9.9.9]
